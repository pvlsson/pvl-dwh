models:
  - name: prep_financial_transactions
    description: >
      Enriched financial transactions combining category mapping and EUR
      conversion. Serves as the direct input to the financial_transactions mart.
    columns:
      - name: transaction_id
        description: Unique key for each transaction based on sort order, renewed upon each table refresh.
        data_tests:
          - not_null
          - unique
      - name: transaction_datetime
        description: Date and time on which the transaction was registered.
      - name: transaction_type
        description: The type of the transaction (e.g. Expense, Income, Transfer, Balance).
      - name: withdrawal_amount
        description: The amount withdrawn in the transaction, in the original currency.
      - name: withdrawal_currency
        description: The currency in which the withdrawal was made.
      - name: withdrawal_account
        description: The account from which the amount was withdrawn.
      - name: deposit_amount
        description: The amount deposited in the transaction, in the original currency.
      - name: deposit_currency
        description: The currency in which the deposit was made.
      - name: deposit_account
        description: The account to which the deposit was made.
      - name: tags
        description: Any labels or categories associated with the transaction.
      - name: note
        description: A free-text note providing additional details about the transaction.
      - name: party
        description: The external party or counterparty involved in the transaction.
      - name: transaction_group
        description: A grouping identifier used to associate the transaction with a batch or related set.
      - name: transaction_category
        description: High-level spending category derived from tags (e.g. Groceries, Transit, Rent).
      - name: rate_to_eur
        description: >
          EUR exchange rate applied to this transaction (units of EUR per 1 unit of
          withdrawal_currency). Null for EUR transactions (rate not needed).
      - name: withdrawal_amount_eur
        description: >
          Withdrawal amount converted to EUR. For EUR transactions this equals
          withdrawal_amount directly; for other currencies it is
          withdrawal_amount * rate_to_eur.
